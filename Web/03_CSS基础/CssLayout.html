<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CSS 浮动与定位：float、relative、absolute、fixed 示例">
    <title>CSS 浮动与定位</title>
    <link rel="stylesheet" href="CssLayout.css">
</head>

<body>
    <!-- 页面头部 -->
    <header>
        <h1>CSS 浮动与定位</h1>
    </header>

    <main>
        <!-- 浮动示例区域 -->
        <section class="container container-1">
            <h2>1. 浮动 float</h2>
            <div>
                <div class="float-img">图片</div>
                文字环绕效果。浮动让元素靠边，内容自动围绕。主要用于图文混排，已逐渐被 Flexbox 取代
            </div>
        </section>

        <!-- 相对定位示例区域 -->
        <section class="container container-2">
            <h2>2. relative 相对定位</h2>
            <p>原位占坑，相对自己偏移</p>
            <div class="box relative">原位置</div>
            <div class="box relative-offset">偏移后</div>
        </section>

        <!-- 绝对定位示例区域 -->
        <section class="container container-3">
            <h2>3. absolute 绝对定位</h2>
            <p>相对于最近定位父级进行定位，脱离文档流，不占原空间。</p>
            <p>absolute-wrap 作为定位父级，absolute 元素相对于它定位</p>
            <div class="absolute-wrap">
                <div class="box absolute">absolute</div>
            </div>
        </section>

        <!-- 固定定位示例区域 -->
        <section class="container container-4">
            <h2>4. fixed 固定定位</h2>
            <p>相对于浏览器窗口，滚动也不动</p>
            <div class="box fixed">fixed</div>
        </section>
    </main>
</body>

</html>
