<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>
    <style>
    /* HTML 注释 <!-- --> 不能用在 <style> 标签内 */
    /* 类选择器 */
    .content-box {
        box-sizing: content-box;
        width: 400px;
        height: 400px;
        border: 1px solid red;
        padding: 20px;
        margin: 20px;
    }
    /* 类选择器 */
    .border-box {
        box-sizing: border-box;
        width: 400px;
        height: 400px;
        border: 1px solid red;
        padding: 20px;
        margin: 20px;
    }
    </style>
</head>
<body>
    <!-- 内容盒子 -->
    <div class="content-box">
        content-box盒子
        <p>实际宽度：content-box宽度 + 内边距 + 边框 = 480px</p>
    </div>
    
    <!-- 边框盒子 -->
    <div class="border-box">
        border-box盒子
        <p>实际宽度：border-box宽度 = 440px</p>
    </div>
</body>
</html>
