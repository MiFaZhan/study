<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <!-- 这行代码告诉手机浏览器：“请用设备的实际屏幕宽度渲染页面，不要把我当成宽屏电脑缩小显示”。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="CSS 媒体查询响应式布局示例">
    <title>媒体查询响应式示例</title>
    <link rel="stylesheet" href="./media.css">
</head>

<body>
    <div class="container">
        <div class="content">
            <h1>响应式布局</h1>
            <p>调整浏览器宽度，体验不同断点样式变化</p>
        </div>
    </div>
</body>

</html>
