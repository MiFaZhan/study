<!DOCTYPE html>
<!-- 声明文档类型为 HTML5 -->
<html lang="zh-CN">
<head>
    <!-- 元信息：字符编码、视口设置、标题 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面标题</title>
    <style type="text/css">
        .container{
            background-color: cadetblue;
        }

        .highlight{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <!-- 页面可见内容放在这里 -->
     <h1>一级标题</h1>
     <h2>二级标题</h2>
     <h3>三级标题</h3>

     &nbsp;

     <p>段落标签
        <strong>加粗文本</strong>
        <em>倾斜文本</em>
        <span>行内容器</span>
     </p>

     <a href="https://www.xiaomi.com">xiaomi</a>

     &nbsp;
    <!-- 锚点链接（页面内跳转） -->
    <a href="#section1">跳转到第一部分</a>

    <div>
        <img src="微信头像.jpg" alt="头像" width="200" height="200">
    </div>

    <div>
        <ul>
            <li>苹果</li>
            <li>香蕉</li>
            <li>橙子</li>
        </ul>

        <ol>
            <li>一</li>
            <li>二</li>
            <li>三</li>
        </ol>
    </div>

    <div class="container">
        <p>这是一个段落</p>
        <p>这是第二个段落</p>
    </div>

    <p>
        这段话中有<span class="highlight">高亮文本</span>
    </p>

</body>
</html>
