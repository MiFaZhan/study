<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /* HTML 注释 <!-- --> 不能用在 <style> 标签内 */
    /* 类选择器 */
    .box {
        width: 200px;
        height: 200px;
        border: 1px solid red;
        padding: 20px;
        margin: 20px;
    }
    /* id选择器 */
    #box1 {
        width: 200px;
        height: 200px;
        border: 1px solid red;
        padding: 20px;
        margin: 20px;
    }
    /* 元素选择器 */
    p {
        text-align: center;
        background-color: pink;
    }
</style>

</head>
<body>
    
    <div class="box">
        我是一个盒子
        我有一个宽度
        我有一个高度
        我有一个边框
        我有一个内边距
        我有一个外边距
    </div>

    <div id="box1">
        我是盒子1
    </div>

    <p>我是一个段落</p>
</body>
</html>
